<!DOCTYPE html>
<html>
<head>
    <title>What Should I Eat Today?</title>

    <style>
        body {
    font-family: "Departure Mono Nerd Font", monospace;

    background: linear-gradient(
        135deg,
        #ffd6e0,
        #ffe8d6
    );

    display: flex;
    flex-direction: column;

    justify-content: center;
    align-items: center;

    min-height: 100vh;

    margin: 0;

    padding: 40px;
}

    .title-card {

        background: white;

        padding: 25px;

        border-radius: 20px;

        text-align: center;

        box-shadow:
            0 10px 25px rgba(0,0,0,0.15);

        margin-bottom: 40px;
    }

    .cards-container {
        display: flex;

        gap: 40px;

        flex-wrap: wrap;

        justify-content: center;
    }

     .card {
        background: white;

        width: 300px;

        padding: 30px;

        border-radius: 25px;

        text-align: center;

        box-shadow:
            0 10px 25px rgba(0,0,0,0.15);
        }

        button {
        background: #ff6b6b;

        margin-top: 25px;

        color: white;

        border: none;

        padding: 15px 25px;

        border-radius: 15px;

        cursor: pointer;

        transition: 0.2s;
    }   

    button:hover {
        transform: scale(1.05);
    }

    #lunch-result,
    #dinner-result {

    background: #f7f7f7;

    padding: 20px;

    margin: 25px 0;

    border-radius: 15px;

    min-height: 40px;

    font-size: 1.5rem;

    font-weight: bold;

    color: #2e7d32;
    margin-bottom: 25px;
}    

    </style>
</head>
<body>
    
    <div class="title-card">
        <h1>Menu Maker</h1>
        <p>Pick today's lunch/dinner!</p>
    </div>

<div class="cards-container">

        <div class="card">

            <h2>Dry Sabzi</h2>

            <div id="dry-result">
                Press the button!
            </div>

            <button onclick="pickdry()">
                Pick Dry Item
            </button>

        </div>

        <div class="card">

            <h2>Pick Wet Sabzi</h2>

            <div id="wet-result">
                Press the button!
            </div>

            <button onclick="pickwet()">
                Pick Wet Item
            </button>

        </div>

    </div>



<script>
   const wet_items = [
    "Moong dal",
    "Channa dal",
    "Tuvar dal",
    "Masoor dal",
    "Moong",
    "Val",
    "Rajma",
    "Chole",
    "Moth",
    "Masoor",
    "Kachori ki sabji",
    "Aloo singi ki sabji",
    "Dahi curry",
    "Mushroom matar",
    "Aloo vadi",
    "Kala channa",
    "Suran"

];

    const dry_items = [
    "Soya tikki",
    "Rajma tikki",
    "Kala channa tikki",
    "Gobi matar",
    "Gobi aloo",
    "Gavar",
    "Baingan stuffed",
    "Baingan fry",
    "Baingan bharta",
    "Stuffed mushrooms",
    "Palak paneer",
    "Chinese paneer",
    "Paneer (other)",
    "Arbi airfryer",
    "Arbi gravy",
    "Beans aloo",
    "Bhee ki sabji",
    "Karela fry",
    "Karela stuffed",
    "Karela sabji",
    "Gajar matar",
    "Aloo tuk",
    "french fries",
    "Stuffed karela",
    "Methi",
    "Suran"
];

    function pickdry() {
        const item = dry_items[
            Math.floor(Math.random() * dry_items.length)
        ];

        document.getElementById("dry-result").textContent = item;
    }

    function pickwet() {
        const item = wet_items[
            Math.floor(Math.random() * wet_items.length)
        ];

        document.getElementById("wet-result").textContent = item;
    }
</script>

</body>
</html>
